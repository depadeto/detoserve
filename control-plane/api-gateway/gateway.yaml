apiVersion: gateway.networking.k8s.io/v1
kind: GatewayClass
metadata:
  name: detoserve
spec:
  controllerName: gateway.envoyproxy.io/gatewayclass-controller
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: detoserve-gateway
  namespace: detoserve-system
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  gatewayClassName: detoserve
  listeners:
    - name: https
      port: 443
      protocol: HTTPS
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: detoserve-tls
      allowedRoutes:
        namespaces:
          from: All
    - name: http-redirect
      port: 80
      protocol: HTTP
      allowedRoutes:
        namespaces:
          from: All
---
# Redirect HTTP → HTTPS
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: http-redirect
  namespace: detoserve-system
spec:
  parentRefs:
    - name: detoserve-gateway
      sectionName: http-redirect
  rules:
    - filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
            statusCode: 301
---
# Main inference API route → Smart Router
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: inference-api
  namespace: detoserve-system
spec:
  parentRefs:
    - name: detoserve-gateway
      sectionName: https
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /v1/
      backendRefs:
        - name: smart-router
          port: 8080
      filters:
        - type: ExtensionRef
          extensionRef:
            group: gateway.envoyproxy.io
            kind: AuthenticationFilter
            name: api-key-auth
    - matches:
        - path:
            type: PathPrefix
            value: /api/
      backendRefs:
        - name: control-plane-api
          port: 8080
---
# Rate limiting per tenant
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: RateLimitFilter
metadata:
  name: tenant-rate-limit
  namespace: detoserve-system
spec:
  type: Global
  global:
    rules:
      - clientSelectors:
          - headers:
              - name: X-Tenant-ID
                type: Distinct
        limit:
          requests: 100
          unit: Second
