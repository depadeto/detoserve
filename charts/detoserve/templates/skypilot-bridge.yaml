apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-skypilot-bridge
  namespace: {{ .Values.global.namespace }}
  labels:
    app: skypilot-bridge
    {{- include "detoserve.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.skypilotBridge.replicaCount }}
  selector:
    matchLabels:
      app: skypilot-bridge
  template:
    metadata:
      labels:
        app: skypilot-bridge
    spec:
      containers:
        - name: skypilot-bridge
          image: "{{ .Values.skypilotBridge.image.repository }}:{{ .Values.skypilotBridge.image.tag }}"
          ports:
            - containerPort: {{ .Values.skypilotBridge.port }}
          env:
            - name: PORT
              value: {{ .Values.skypilotBridge.port | quote }}
            - name: SERVICES_DIR
              value: {{ .Values.skypilotBridge.env.SERVICES_DIR | quote }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: {{ .Values.skypilotBridge.port }}
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: {{ .Values.skypilotBridge.port }}
            initialDelaySeconds: 3
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-skypilot-bridge
  namespace: {{ .Values.global.namespace }}
  labels:
    app: skypilot-bridge
    {{- include "detoserve.labels" . | nindent 4 }}
spec:
  selector:
    app: skypilot-bridge
  ports:
    - port: {{ .Values.skypilotBridge.port }}
      targetPort: {{ .Values.skypilotBridge.port }}

