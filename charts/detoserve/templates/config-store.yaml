apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-config-store
  namespace: {{ .Values.global.namespace }}
  labels:
    app: config-store
    {{- include "detoserve.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.configStore.replicaCount }}
  selector:
    matchLabels:
      app: config-store
  template:
    metadata:
      labels:
        app: config-store
    spec:
      containers:
        - name: config-store
          image: "{{ .Values.configStore.image.repository }}:{{ .Values.configStore.image.tag }}"
          ports:
            - containerPort: {{ .Values.configStore.port }}
          env:
            - name: PORT
              value: {{ .Values.configStore.port | quote }}
            - name: STORAGE_DIR
              value: {{ .Values.configStore.env.STORAGE_DIR | quote }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: {{ .Values.configStore.port }}
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: {{ .Values.configStore.port }}
            initialDelaySeconds: 3
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-config-store
  namespace: {{ .Values.global.namespace }}
  labels:
    app: config-store
    {{- include "detoserve.labels" . | nindent 4 }}
spec:
  selector:
    app: config-store
  ports:
    - port: {{ .Values.configStore.port }}
      targetPort: {{ .Values.configStore.port }}

