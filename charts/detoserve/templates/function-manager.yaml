apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-function-manager
  namespace: {{ .Values.global.namespace }}
  labels:
    app: function-manager
    {{- include "detoserve.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.functionManager.replicaCount }}
  selector:
    matchLabels:
      app: function-manager
  template:
    metadata:
      labels:
        app: function-manager
    spec:
      containers:
        - name: function-manager
          image: "{{ .Values.functionManager.image.repository }}:{{ .Values.functionManager.image.tag }}"
          ports:
            - containerPort: {{ .Values.functionManager.port }}
          env:
            - name: PORT
              value: {{ .Values.functionManager.port | quote }}
            - name: CONFIG_STORE_URL
              value: {{ .Values.functionManager.env.CONFIG_STORE_URL | quote }}
            - name: DEV_MODE
              value: {{ .Values.functionManager.env.DEV_MODE | default "false" | quote }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: {{ .Values.functionManager.port }}
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: {{ .Values.functionManager.port }}
            initialDelaySeconds: 3
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-function-manager
  namespace: {{ .Values.global.namespace }}
  labels:
    app: function-manager
    {{- include "detoserve.labels" . | nindent 4 }}
spec:
  selector:
    app: function-manager
  ports:
    - port: {{ .Values.functionManager.port }}
      targetPort: {{ .Values.functionManager.port }}

