global:
  namespace: detoserve-system

redis:
  image:
    repository: redis
    tag: 7-alpine
  replicaCount: 1
  port: 6379
  resources:
    requests:
      cpu: "500m"
      memory: "1Gi"

smartRouter:
  image:
    repository: detoserve/smart-router
    tag: latest
  replicaCount: 2
  port: 8080
  env:
    REDIS_ADDR: "detoserve-redis:6379"

tenantManager:
  image:
    repository: detoserve/tenant-manager
    tag: latest
  replicaCount: 2
  port: 8083

skypilotBridge:
  image:
    repository: detoserve/skypilot-bridge
    tag: latest
  replicaCount: 1
  port: 8085
  env:
    SERVICES_DIR: "/app/services"

deploymentManager:
  image:
    repository: detoserve/deployment-manager
    tag: latest
  replicaCount: 2
  port: 8082
  env:
    SKYPILOT_BRIDGE_URL: "http://detoserve-skypilot-bridge:8085"

functionManager:
  image:
    repository: detoserve/function-manager
    tag: latest
  replicaCount: 1
  port: 8086
  env:
    CONFIG_STORE_URL: "http://detoserve-config-store:8087"

configStore:
  image:
    repository: detoserve/config-store
    tag: latest
  replicaCount: 1
  port: 8087
  env:
    STORAGE_DIR: "/data/configs"
  persistence:
    enabled: false
    size: 1Gi