apiVersion: scheduling.run.ai/v2
kind: Queue
metadata:
  name: detoserve-root
spec:
  displayName: "DetoServe Root"
  resources:
    gpu:
      quota: 20
      limit: 20
---
apiVersion: scheduling.run.ai/v2
kind: Queue
metadata:
  name: inference-queue
spec:
  displayName: "Inference Workloads"
  parentQueue: detoserve-root
  resources:
    gpu:
      quota: 16
      limit: 20
---
apiVersion: scheduling.run.ai/v2
kind: Queue
metadata:
  name: dev-queue
spec:
  displayName: "Development"
  parentQueue: detoserve-root
  resources:
    gpu:
      quota: 4
      limit: 8
