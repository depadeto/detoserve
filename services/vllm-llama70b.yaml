# SkyPilot service: Llama 3.1 70B on vLLM
service:
  replicas:
    min: 2
    max: 20
  readiness_probe:
    path: /health
    initial_delay_seconds: 120

resources:
  accelerators: A100:4
  memory: 128+
  disk_size: 256

setup: |
  pip install vllm

run: |
  python -m vllm.entrypoints.openai.api_server \
    --model meta-llama/Llama-3.1-70B-Instruct \
    --tensor-parallel-size 4 \
    --enable-prefix-caching \
    --enable-chunked-prefill \
    --max-model-len 8192 \
    --port 8000
