# DetoServe — local development stack (all Go services)
# Run: docker compose up

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  smart-router:
    build: ./control-plane/smart-router
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      REDIS_ADDR: redis:6379
    depends_on:
      - redis

  tenant-manager:
    build: ./control-plane/tenant-manager
    ports:
      - "8083:8083"
    environment:
      PORT: "8083"

  skypilot-bridge:
    build:
      context: ./control-plane/skypilot-bridge
      dockerfile: Dockerfile.golang
    ports:
      - "8085:8085"
    environment:
      PORT: "8085"
      SERVICES_DIR: /app/services
    volumes:
      - ./services:/app/services
      - ~/.aws:/root/.aws:ro
      - ~/.config/gcloud:/root/.config/gcloud:ro
      - ~/.kube:/root/.kube:ro
      - ~/.sky:/root/.sky

  cluster-manager:
    build: ./control-plane/cluster-manager
    ports:
      - "8084:8084"
    environment:
      PORT: "8084"

  deployment-manager:
    build: ./control-plane/deployment-manager
    ports:
      - "8082:8082"
    environment:
      PORT: "8082"
      SKYPILOT_BRIDGE_URL: http://skypilot-bridge:8085
    depends_on:
      - skypilot-bridge

  function-manager:
    build: ./control-plane/function-manager
    ports:
      - "8086:8086"
    environment:
      PORT: "8086"
      CONFIG_STORE_URL: http://config-store:8087
      DEV_MODE: "true"
    depends_on:
      - config-store
    volumes:
      - ~/.kube:/root/.kube:ro
      - ~/.sky:/root/.sky

  config-store:
    build: ./control-plane/config-store
    ports:
      - "8087:8087"
    environment:
      PORT: "8087"
      STORAGE_DIR: /data/configs
    volumes:
      - config-data:/data/configs

  api-gateway:
    build: ./control-plane/api-gateway
    ports:
      - "8090:8090"
    environment:
      GATEWAY_PORT: "8090"
      FUNCTION_MANAGER_URL: http://function-manager:8086
    depends_on:
      - function-manager

volumes:
  config-data:
