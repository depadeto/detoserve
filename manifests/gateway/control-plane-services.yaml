# Control Plane microservices deployment
---
# Cluster Manager
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cluster-manager
  namespace: detoserve-system
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cluster-manager
  template:
    metadata:
      labels:
        app: cluster-manager
    spec:
      containers:
        - name: cluster-manager
          image: detoserve/cluster-manager:latest
          ports:
            - containerPort: 8081
          env:
            - name: PORT
              value: "8081"
          resources:
            requests:
              cpu: "1"
              memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: cluster-manager
  namespace: detoserve-system
spec:
  selector:
    app: cluster-manager
  ports:
    - port: 8081
      targetPort: 8081
---
# Deployment Manager
apiVersion: apps/v1
kind: Deployment
metadata:
  name: deployment-manager
  namespace: detoserve-system
spec:
  replicas: 2
  selector:
    matchLabels:
      app: deployment-manager
  template:
    metadata:
      labels:
        app: deployment-manager
    spec:
      containers:
        - name: deployment-manager
          image: detoserve/deployment-manager:latest
          ports:
            - containerPort: 8082
          env:
            - name: PORT
              value: "8082"
          resources:
            requests:
              cpu: "1"
              memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: deployment-manager
  namespace: detoserve-system
spec:
  selector:
    app: deployment-manager
  ports:
    - port: 8082
      targetPort: 8082
---
# Tenant Manager
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tenant-manager
  namespace: detoserve-system
spec:
  replicas: 2
  selector:
    matchLabels:
      app: tenant-manager
  template:
    metadata:
      labels:
        app: tenant-manager
    spec:
      containers:
        - name: tenant-manager
          image: detoserve/tenant-manager:latest
          ports:
            - containerPort: 8083
          env:
            - name: PORT
              value: "8083"
          resources:
            requests:
              cpu: "1"
              memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: tenant-manager
  namespace: detoserve-system
spec:
  selector:
    app: tenant-manager
  ports:
    - port: 8083
      targetPort: 8083
---
# Control Plane API (unified API for dashboard/CLI)
apiVersion: v1
kind: Service
metadata:
  name: control-plane-api
  namespace: detoserve-system
spec:
  selector:
    app: cluster-manager
  ports:
    - port: 8080
      targetPort: 8081
---
# Redis Cluster for Smart Router
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis-cluster
  namespace: detoserve-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis-cluster
  template:
    metadata:
      labels:
        app: redis-cluster
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
          resources:
            requests:
              cpu: "0.5"
              memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: redis-cluster
  namespace: detoserve-system
spec:
  selector:
    app: redis-cluster
  ports:
    - port: 6379
      targetPort: 6379
